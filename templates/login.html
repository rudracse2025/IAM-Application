{% extends "base.html" %}
{% block title %}Login · Company IAM{% endblock %}

{% block breadcrumbs %}
<nav class="breadcrumbs" aria-label="Breadcrumb"><a href="{{ url_for('index') }}">Home</a> / Login</nav>
{% endblock %}

{% block content %}
<section class="card" style="max-width: 460px; margin: 0 auto;" aria-labelledby="login-title">
  <h2 id="login-title">Welcome back</h2>
  <p class="muted">Sign in to access your IAM dashboard.</p>

  <form method="post" novalidate>
    <div class="field-group">
      <label for="email">Work email</label>
      <input id="email" type="email" name="email" required autocomplete="username" aria-describedby="email-hint">
      <div id="email-hint" class="validation-hint"></div>
    </div>

    <div class="field-group">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input id="password" type="password" name="password" required autocomplete="current-password" aria-describedby="password-hint">
        <button type="button" class="password-toggle" data-password-toggle="password">Show</button>
      </div>
      <div id="password-hint" class="validation-hint"></div>
    </div>

    <label><input type="checkbox" name="remember"> Remember me on this device</label>

    <button type="submit" class="btn" data-loading-text="Signing in">Login</button>
    <p class="muted">No account yet? <a href="{{ url_for('signup') }}">Create one</a>.</p>
  </form>
</section>
{% endblock %}
