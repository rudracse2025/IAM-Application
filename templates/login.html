{% extends "base.html" %}

{% block content %}
<div class="card">
  <h2>Login</h2>
  <form method="post">
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn">Login</button>
  </form>
</div>
{% endblock %}
